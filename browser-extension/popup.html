<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <style>
    body {
      width: 320px;
      font-family: -apple-system, Segoe UI, sans-serif;
      padding: 12px;
      background: #0f1115;
      color: #e6e6e6;
    }

    h1 {
      font-size: 14px;
      margin: 0 0 10px 0;
      color: #fff;
    }

    .status {
      font-size: 11px;
      color: #888;
      margin-bottom: 10px;
    }

    .status.ok {
      color: #4ade80;
    }

    .status.err {
      color: #f87171;
    }

    .job {
      background: #1a1d24;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
    }

    .job-name {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }

    .bar-bg {
      background: #2a2e38;
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
    }

    .bar-fill {
      background: #6366f1;
      height: 100%;
      transition: width 0.3s ease;
    }

    .job-meta {
      font-size: 10px;
      color: #999;
      margin-top: 5px;
      display: flex;
      justify-content: space-between;
    }

    .empty {
      font-size: 12px;
      color: #777;
      text-align: center;
      padding: 20px 0;
    }
  </style>
</head>

<body>
  <h1>Downloading 2.0</h1>
  <div id="serverStatus" class="status">Checking DL2 Cloud...</div>
  <div id="jobs"></div>
  <script src="popup.js"></script>
</body>

</html>
